name: Deploy Nuxt Project

on:
  push:
    branches:
      - master  # 当推送到 master 分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Inject private links
        env:
          LINKS_JSON: ${{ secrets.LINKS_JSON }}
        run: |
          mkdir -p app/data
          printf 'export default %s\n' "$LINKS_JSON" > app/data/links.local.ts

      - name: Build Docker image
        run: |
          docker build \
            -t hollow288/ht-data-nuxt:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push hollow288/ht-data-nuxt:latest
